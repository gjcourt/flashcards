server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  # Health probe used by Kubernetes liveness/readiness and the Docker
  # HEALTHCHECK. Returns 200 with no body, no logging.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Cache hashed assets aggressively — Vite emits content-hashed filenames
  # so anything under /assets/ is safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location /nato/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # NATO-locked SPA: fall back to the locked index.html for any unknown path
  # under /nato/ so client-side routing (e.g. /nato/decks/nato/cards) works.
  location /nato/ {
    try_files $uri $uri/ /nato/index.html;
  }

  # Multi-deck SPA: same fallback for the root tree.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
