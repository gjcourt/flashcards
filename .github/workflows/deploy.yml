name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queue subsequent pushes, don't cancel them.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  # Two builds combined into a single artifact:
  #   /             → multi-deck app
  #   /nato/        → NATO-locked focused build (VITE_LOCKED_DECK=nato)
  # Both share the same code; only env vars + Vite `base` differ.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build multi-deck (root)
        env:
          BASE_PATH: /flashcards/
        run: npm run build

      - name: Stage multi-deck output
        run: |
          mkdir -p site
          cp -r dist/. site/

      - name: Build NATO-locked (subpath)
        env:
          BASE_PATH: /flashcards/nato/
          VITE_LOCKED_DECK: nato
        run: npm run build

      - name: Stage NATO build under /nato/
        run: |
          mkdir -p site/nato
          cp -r dist/. site/nato/

      # GitHub Pages serves 404.html on any unknown path. For an SPA we want
      # that to be the app's index so client-side routing can handle the
      # path. Copy index.html to 404.html in each build root.
      - name: SPA fallback (404.html)
        run: |
          cp site/index.html site/404.html
          cp site/nato/index.html site/nato/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
