name: Build and publish image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          # Date-stamped tag matches the rest of gjcourt/* images
          # (e.g. ghcr.io/gjcourt/overture:2026-05-02). Renovate updates
          # consumers (homelab) to the latest published tag.
          DATE=$(date -u +%Y-%m-%d)
          SHA=${GITHUB_SHA::7}
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$DATE" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$DATE-$SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
